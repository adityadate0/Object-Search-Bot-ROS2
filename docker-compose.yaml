version: '3.8'

services:
  ros2_simulation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: object_search_bot_container
    image: object_search_bot:latest
    network_mode: "host"
    pid: "host"
    ipc: "host"
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    volumes:
      - ./src:/root/ros2_ws/src
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    stdin_open: true
    tty: true
